name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version, semver e.g. 1.2.3 (a leading v is stripped)"
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: release
  cancel-in-progress: false

env:
  IMAGE_NAME: sky-starter

jobs:
  # Validate, fail fast on guards, and run the full test gate. No environment,
  # so this runs immediately with no approval.
  verify:
    name: Validate, guard, and test
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.ver.outputs.version }}
      tag: ${{ steps.ver.outputs.tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Normalise and validate version
        id: ver
        run: |
          VERSION="${{ inputs.version }}"
          VERSION="${VERSION#v}"
          if [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Version '$VERSION' is not semver X.Y.Z"
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"

      - name: Guard — GitHub release must not already exist
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "${{ steps.ver.outputs.tag }}" >/dev/null 2>&1; then
            echo "::error::GitHub release ${{ steps.ver.outputs.tag }} already exists"
            exit 1
          fi

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Guard — Docker Hub tag must not already exist
        run: |
          IMAGE="${{ secrets.DOCKERHUB_USERNAME }}/${IMAGE_NAME}"
          if docker manifest inspect "$IMAGE:${{ steps.ver.outputs.version }}" >/dev/null 2>&1; then
            echo "::error::$IMAGE:${{ steps.ver.outputs.version }} already exists on Docker Hub"
            exit 1
          fi

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "25"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build and test
        run: ./gradlew check --no-daemon --stacktrace

  # MANUAL APPROVAL GATE 1: build + push the image to Docker Hub.
  # The 'dockerhub' environment's required reviewers must approve before this
  # job starts. Configure it under Settings -> Environments.
  publish-image:
    name: Build and push image to Docker Hub
    needs: verify
    runs-on: ubuntu-latest
    environment: dockerhub
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:${{ needs.verify.outputs.version }}
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:latest

  # MANUAL APPROVAL GATE 2: create the GitHub release (and the git tag).
  # The 'github-release' environment's required reviewers must approve before
  # this job starts.
  github-release:
    name: Create GitHub release
    needs: [verify, publish-image]
    runs-on: ubuntu-latest
    environment: github-release
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ needs.verify.outputs.tag }}" \
            --target "${{ github.sha }}" \
            --title "${{ needs.verify.outputs.tag }}" \
            --generate-notes
