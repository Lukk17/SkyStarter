name: CI

on:
  pull_request:
  push:
    branches: [develop, master]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build and test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "25"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      # check runs unit + Testcontainers integration tests + ArchUnit + the
      # JaCoCo coverage gate. ubuntu-latest ships a Docker daemon, so
      # Testcontainers works without extra setup.
      - name: Build and test
        run: ./gradlew check --no-daemon --stacktrace
