info:
  name: example get
  type: http
  seq: 1

http:
  method: GET
  url: "{{protocol}}://{{baseUrl}}:{{port}}{{apiPath}}/:id"
  params:
    - name: id
      value: 4f29d6e2-b0cb-49a7-b8f7-7b65a587142e
      type: path
  auth: inherit

runtime:
  scripts:
    - type: tests
      code: |
        test("status is 200", function () {
          expect(res.getStatus()).to.equal(200);
        });
        test("body exposes skyId, name, status", function () {
          const body = res.getBody();
          expect(body).to.have.property("skyId");
          expect(body).to.have.property("name");
          expect(body).to.have.property("status");
        });

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
