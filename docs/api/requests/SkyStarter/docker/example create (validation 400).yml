info:
  name: example create (validation 400)
  type: http
  seq: 5

http:
  method: POST
  url: "{{protocol}}://{{baseUrl}}:{{port}}/v1/starter"
  body:
    type: json
    data: "{\r\n    \"name\": \"  \"\r\n}"
  auth: inherit

runtime:
  scripts:
    - type: tests
      code: |
        test("status is 400", function () {
          expect(res.getStatus()).to.equal(400);
        });
        test("content-type is application/problem+json", function () {
          expect(res.getHeader("content-type")).to.match(/application\/problem\+json/);
        });
        test("body is ProblemDetail with validation type", function () {
          const body = res.getBody();
          expect(body.type).to.equal("urn:skystarter:error:validation");
          expect(body.title).to.equal("Validation Error");
        });
        test("errors map includes blank name", function () {
          const body = res.getBody();
          expect(body.errors).to.have.property("name");
        });

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
