info:
  name: "[direct] example create"
  type: http
  seq: 2

http:
  method: POST
  url: "{{protocol}}://{{baseUrl}}:{{port}}/v1/starter"
  body:
    type: json
    data: "{\r\n    \"name\": \"Songo100\"\r\n}"
  auth: inherit

runtime:
  scripts:
    - type: after-response
      code: |
        // Publish the created Sky id as a collection-level variable so the
        // get / update / delete requests pick it up via {{id}}.
        const body = res.getBody();
        if (typeof body === "string" && /^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$/i.test(body)) {
          bru.setVar("id", body);
        }
    - type: tests
      code: |
        test("status is 201", function () {
          expect(res.getStatus()).to.equal(201);
        });
        test("body is a UUID string", function () {
          const body = res.getBody();
          expect(body).to.be.a("string");
          expect(body).to.match(/^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$/);
        });

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
