info:
  name: "[direct] example get"
  type: http
  seq: 1

http:
  method: GET
  url: "{{protocol}}://{{baseUrl}}:{{port}}/v1/starter/:id"
  params:
    - name: id
      value: 9ea3971b-c407-42fb-969f-fe63dee642ac
      type: path
  auth: inherit

runtime:
  scripts:
    - type: tests
      code: |
        test("status is 200", function () {
          expect(res.getStatus()).to.equal(200);
        });
        test("body exposes skyId, name, status", function () {
          const body = res.getBody();
          expect(body).to.have.property("skyId");
          expect(body).to.have.property("name");
          expect(body).to.have.property("status");
        });

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
